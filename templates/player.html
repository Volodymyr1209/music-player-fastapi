<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #121212, #1e1e1e);
            color: white;
            min-height: 100vh;
            padding: 40px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 48px;
            color: #1db954;
            margin-bottom: 10px;
        }

        .header p {
            color: #b3b3b3;
            font-size: 18px;
        }

        .main-player {
            background: #222;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 35px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        #nowPlaying {
            font-size: 28px;
            margin-bottom: 15px;
            color: #1db954;
        }

        #player {
            width: 100%;
            margin-top: 15px;
        }

        .controls {
            margin-top: 15px;
        }

        .controls button {
            background: #1db954;
            border: none;
            color: white;
            padding: 12px 20px;
            margin: 0 5px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        .controls button:hover {
            background: #18a34a;
        }

        .track-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .track-card {
            background: #222;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
            transition: 0.3s;
            cursor: pointer;
        }

        .track-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(29,185,84,0.25);
        }

        .cover {
            width: 120px;
            height: 120px;
            min-width: 120px;
            border-radius: 15px;
            background: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
        }

        .track-title {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .track-meta {
            color: #b3b3b3;
            margin-bottom: 10px;
        }

        .badge {
            display: inline-block;
            background: #1db954;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            color: #777;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>🎵 Music Player</h1>
        <p>FastAPI + PostgreSQL + Docker</p>
    </div>

    {% if tracks %}

    <div class="main-player">

        <h2 id="nowPlaying">
            Виберіть трек
        </h2>

        <audio id="player" controls>
        </audio>

        <div class="controls">
            <button onclick="prevTrack()">⏮ Попередня</button>
            <button onclick="nextTrack()">⏭ Наступна</button>
        </div>

    </div>

    <div class="track-list">

        {% for track in tracks %}

        <div
            class="track-card"
            onclick="playTrack('{{ track.id }}', '{{ track.title }}')"
        >

            <div class="cover">
                🎵
            </div>

            <div>

                <div class="track-title">
                    {{ track.title }}
                </div>

                <div class="track-meta">
                    Genre: {{ track.genre }}
                </div>

                <div class="badge">
                    Album: {{ track.album_id }}
                </div>

            </div>

        </div>

        {% endfor %}

    </div>

    {% else %}

    <h2 style="text-align:center">
        Немає завантажених треків 🎵
    </h2>

    {% endif %}

    <footer>
        Music Player API © 2026
    </footer>

</div>


<script>

const tracks = [
{% for track in tracks %}
{
    id: "{{ track.id }}",
    title: "{{ track.title }}"
}{% if not loop.last %},{% endif %}
{% endfor %}
];

let currentIndex = -1;

const player = document.getElementById("player");
const nowPlaying = document.getElementById("nowPlaying");

function playTrack(id, title)
{
    currentIndex = tracks.findIndex(
        track => track.id === id
    );

    player.src = "/tracks/" + id + "/play";

    player.play();

    nowPlaying.innerText = title;
}

function nextTrack()
{
    if (tracks.length === 0)
    {
        return;
    }

    if (currentIndex === -1)
    {
        currentIndex = 0;
    }
    else
    {
        currentIndex++;

        if (currentIndex >= tracks.length)
        {
            currentIndex = 0;
        }
    }

    playTrack(
        tracks[currentIndex].id,
        tracks[currentIndex].title
    );
}

function prevTrack()
{
    if (tracks.length === 0)
    {
        return;
    }

    if (currentIndex === -1)
    {
        currentIndex = tracks.length - 1;
    }
    else
    {
        currentIndex--;

        if (currentIndex < 0)
        {
            currentIndex = tracks.length - 1;
        }
    }

    playTrack(
        tracks[currentIndex].id,
        tracks[currentIndex].title
    );
}

player.addEventListener(
    "ended",
    nextTrack
);

</script>


</body>
</html>
